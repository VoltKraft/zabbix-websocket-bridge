name: container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/voltkraft/zabbix-websocket-bridge
  CANDIDATE_TAG: ghcr.io/voltkraft/zabbix-websocket-bridge:build-candidate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build candidate image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          load: true
          tags: ${{ env.CANDIDATE_TAG }}
          labels: |
            org.opencontainers.image.title=zabbix-websocket-bridge
            org.opencontainers.image.description=Generic stateless HTTP-to-WebSocket JSON-RPC bridge
            org.opencontainers.image.source=https://github.com/VoltKraft/zabbix-websocket-bridge
            org.opencontainers.image.licenses=AGPL-3.0-only
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Compare candidate with published latest
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          candidate_config="$(docker image inspect "${CANDIDATE_TAG}" --format '{{.Id}}')"
          remote_config=""

          if raw="$(docker buildx imagetools inspect --raw "${IMAGE_NAME}:latest" 2>/dev/null)"; then
            remote_config="$(jq -r '.config.digest // empty' <<<"${raw}")"

            if [ -z "${remote_config}" ]; then
              manifest_digest="$(jq -r '[.manifests[]? | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest][0] // empty' <<<"${raw}")"

              if [ -n "${manifest_digest}" ]; then
                manifest="$(docker buildx imagetools inspect --raw "${IMAGE_NAME}@${manifest_digest}")"
                remote_config="$(jq -r '.config.digest // empty' <<<"${manifest}")"
              fi
            fi
          fi

          echo "candidate_config=${candidate_config}" >> "${GITHUB_OUTPUT}"
          echo "remote_config=${remote_config}" >> "${GITHUB_OUTPUT}"

          if [ -n "${remote_config}" ] && [ "${candidate_config}" = "${remote_config}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Candidate image matches ${IMAGE_NAME}:latest; skipping publish."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Candidate image differs from ${IMAGE_NAME}:latest; publishing is required."
          fi

      - name: Publish candidate image
        if: steps.compare.outputs.changed == 'true' || github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            docker tag "${CANDIDATE_TAG}" "${tag}"
            docker push "${tag}"
          done <<<"${TAGS}"
        env:
          TAGS: ${{ steps.meta.outputs.tags }}

      - name: Skip publish
        if: steps.compare.outputs.changed == 'false' && github.ref_type != 'tag'
        run: echo "No image changes detected compared to ${IMAGE_NAME}:latest."
